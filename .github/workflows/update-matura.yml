name: Update Matura JSON

on:
  schedule:
    - cron: "0 3 * * *"   # codziennie o 03:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install pdfplumber

    - name: Download CKE PDF
      run: |
        curl -L "https://cke.gov.pl/media/..." -o matura.pdf

    - name: Parse PDF → JSON
      run: |
        python parser/parse_matura.py > matura.json

    - name: Commit changes
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add matura.json
        git commit -m "Automatyczna aktualizacja matur" || echo "Brak zmian"

    - name: Push
      uses: ad-m/github-push-action@v0.8.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}

